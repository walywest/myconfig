monitor=,preferred,auto,1.0
# monitor=eDP-1,1920x1080@60,0x0,1.0


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = foot
$fileManager = dolphin
$menu = wofi --show drun
$bluetooth = blueman-manager
$browser = flatpak run com.google.Chrome


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $terminal
exec-once = waybar & hyprpaper & nm-applet & 
# exec-once = hyprpanel

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/
# env = GTK_THEME,Tokyo-Night-Dark
# env = GTK_ICON_THEME,Adwaita

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 2
    gaps_out = 2
    border_size = 1

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    resize_on_border = false
    allow_tearing = false

    layout = dwindle
}


# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 0
    rounding_power = 0

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0


    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1
        
        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0.5 # -1.0 - 1.0, 0 means no modification.

    #xset r rate 200 35
    repeat_rate = 35
    repeat_delay = 200


    touchpad {
        natural_scroll = false
    }
}

cursor {
    inactive_timeout = 30
    no_hardware_cursors = true
}


# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


####################
### KEYBINDINGSS ###
####################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$alt = ALT

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $alt, Return, exec, $terminal
bind = $alt, Q, killactive,
bind = $mainMod, M, exit,
bind = $alt, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $alt, SPACE, exec, $menu
bind = $alt, B, exec, $bluetooth
bind = $mainMod, R, exec, $reload_waybar
bind = $mainMod, S, exec, $snip
bind = $alt, G, exec, $browser

# Move focus with mainMod + arrow keys
bind = CTRL, SPACE, exec, rofi -show window
bind = $alt, l, movefocus, r
bind = $alt, h, movefocus, l
bind = $alt, k, movefocus, u
bind = $alt, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $alt, 1, workspace, 1
bind = $alt, 2, workspace, 2
bind = $alt, 3, workspace, 3
bind = $alt, 4, workspace, 4
bind = $alt, 5, workspace, 5
bind = $alt, 6, workspace, 6
bind = $alt, 7, workspace, 7
bind = $alt, 8, workspace, 8
bind = $alt, 9, workspace, 9
bind = $alt, 0, workspace, 10

# Move active window to a workspace with alt + SHIFT + [0-9]
bind = $alt SHIFT, 1, movetoworkspace, 1
bind = $alt SHIFT, 2, movetoworkspace, 2
bind = $alt SHIFT, 3, movetoworkspace, 3
bind = $alt SHIFT, 4, movetoworkspace, 4
bind = $alt SHIFT, 5, movetoworkspace, 5
bind = $alt SHIFT, 6, movetoworkspace, 6
bind = $alt SHIFT, 7, movetoworkspace, 7
bind = $alt SHIFT, 8, movetoworkspace, 8
bind = $alt SHIFT, 9, movetoworkspace, 9
bind = $alt SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $alt, S, togglespecialworkspace, magic
bind = $alt SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume and brightness controls (binde = repeat when held)
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+ && notify-send -h string:x-canonical-private-synchronous:volume -u low "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}')%"
binde = , XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%- && notify-send -h string:x-canonical-private-synchronous:volume -u low "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{print int($2*100)}')%"
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && notify-send -h string:x-canonical-private-synchronous:volume -u low "Volume: $(wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep MUTED && echo 'Muted' || echo 'Unmuted')"
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5% && notify-send -h string:x-canonical-private-synchronous:brightness -u low "Brightness: $(brightnessctl get)%"
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && notify-send -h string:x-canonical-private-synchronous:brightness -u low "Brightness: $(brightnessctl get)%"


